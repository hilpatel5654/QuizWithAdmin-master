{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Quiz Academy</title>
  <link rel="stylesheet" href="{% static 'css/demo.css' %}">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{% static 'images/logo.png' %}" alt="Quiz Academy">
    </div>
    <h1 class="auth-heading">Reset Password</h1>
    <p class="auth-subheading">Enter your registered email address and we will send an OTP to reset your password.</p>

    {% if msg %}
    <div class="alert alert-{{ msg_type }}">{{ msg }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Registered Email Address</label>
        {{ form.email }}
        {% for err in form.email.errors %}
        <div class="form-hint" style="color:var(--danger);">{{ err }}</div>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Send OTP</button>
    </form>

    <div class="auth-divider" style="margin-top:24px;">
      <a href="{% url 'student_login_view' %}" class="auth-link">Back to Login</a>
    </div>
  </div>

  <style>
    input[type="email"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-family: var(--font);
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    input[type="email"]:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-alpha);
    }
  </style>
</body>
</html>
